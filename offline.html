<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — Camarai Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100dvh;
      background-color: #111827;
      color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(155, 110, 253, 0.15);
      border: 2px solid rgba(155, 110, 253, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f3f4f6;
    }

    p {
      color: rgba(243, 244, 246, 0.65);
      font-size: 0.95rem;
      max-width: 320px;
      line-height: 1.6;
    }

    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #9B6EFD;
      color: #ffffff;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Sin conexión</h1>
  <p>Camarai Dashboard necesita conexión a internet para funcionar. Comprueba tu red e inténtalo de nuevo.</p>
  <button onclick="window.location.reload()">Reintentar</button>
</body>
</html>
